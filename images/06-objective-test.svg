<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Noto Sans TC', sans-serif">
  <defs>
    <linearGradient id="sky6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
    <filter id="glow6">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#sky6)"/>
  <!-- Title -->
  <rect x="80" y="20" width="640" height="55" rx="28" fill="#283593" filter="url(#glow6)"/>
  <text x="400" y="55" text-anchor="middle" fill="white" font-size="20" font-weight="bold">🧪 客觀測試（Objective Test）</text>
  <!-- Magnifying glass -->
  <circle cx="400" cy="280" r="120" fill="none" stroke="#283593" stroke-width="8" filter="url(#glow6)"/>
  <circle cx="400" cy="280" r="110" fill="white" opacity="0.9"/>
  <rect x="490" y="370" width="60" height="15" rx="7" fill="#283593" transform="rotate(45,520,377)"/>
  <!-- Inside the magnifying glass -->
  <text x="400" y="240" text-anchor="middle" fill="#283593" font-size="15" font-weight="bold">合理的人</text>
  <text x="400" y="265" text-anchor="middle" fill="#283593" font-size="15" font-weight="bold">Reasonable Person</text>
  <line x1="310" y1="280" x2="490" y2="280" stroke="#C5CAE9" stroke-width="1"/>
  <text x="400" y="310" text-anchor="middle" fill="#555" font-size="13">站在受要約人的立場</text>
  <text x="400" y="335" text-anchor="middle" fill="#555" font-size="13">會如何理解該表示？</text>
  <!-- Test questions -->
  <rect x="50" y="430" width="320" height="130" rx="15" fill="white" stroke="#4CAF50" stroke-width="2" filter="url(#glow6)"/>
  <rect x="50" y="430" width="320" height="35" rx="15" fill="#4CAF50"/>
  <rect x="50" y="450" width="320" height="15" fill="#4CAF50"/>
  <text x="210" y="455" text-anchor="middle" fill="white" font-size="14" font-weight="bold">✅ 構成要約的條件</text>
  <text x="70" y="490" fill="#333" font-size="12">• 使用了明確的承諾字眼</text>
  <text x="70" y="515" fill="#333" font-size="12">• 合理人會認為一經承諾即受約束</text>
  <text x="70" y="540" fill="#333" font-size="12">• 條款足夠確定</text>

  <rect x="430" y="430" width="320" height="130" rx="15" fill="white" stroke="#F44336" stroke-width="2" filter="url(#glow6)"/>
  <rect x="430" y="430" width="320" height="35" rx="15" fill="#F44336"/>
  <rect x="430" y="450" width="320" height="15" fill="#F44336"/>
  <text x="590" y="455" text-anchor="middle" fill="white" font-size="14" font-weight="bold">❌ 不構成要約</text>
  <text x="450" y="490" fill="#333" font-size="12">• 僅是提供資訊或表達意向</text>
  <text x="450" y="515" fill="#333" font-size="12">• 合理人不會認為已受約束</text>
  <text x="450" y="540" fill="#333" font-size="12">• 條款不夠確定</text>

  <!-- Bottom -->
  <rect x="200" y="580" width="400" height="0" fill="#283593"/>
  <!-- Stars -->
  <text x="100" y="150" fill="#FFD54F" font-size="16">✦</text>
  <text x="700" y="130" fill="#FFD54F" font-size="14">✦</text>
  <text x="650" y="400" fill="#FFD54F" font-size="12">✦</text>
</svg>
