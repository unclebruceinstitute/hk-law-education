<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Noto Sans TC', sans-serif">
  <defs>
    <linearGradient id="sky7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFCCBC"/>
      <stop offset="50%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
    <filter id="card7">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#sky7)"/>
  <!-- Title -->
  <rect x="100" y="20" width="600" height="55" rx="28" fill="#E65100" filter="url(#card7)"/>
  <text x="400" y="55" text-anchor="middle" fill="white" font-size="20" font-weight="bold">📚 案例比較 — 語境決定性質</text>
  <!-- Case 1: Harvey v Facey -->
  <rect x="30" y="100" width="360" height="220" rx="15" fill="white" stroke="#4CAF50" stroke-width="2.5" filter="url(#card7)"/>
  <rect x="30" y="100" width="360" height="45" rx="15" fill="#4CAF50"/>
  <rect x="30" y="130" width="360" height="15" fill="#4CAF50"/>
  <text x="210" y="130" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Harvey v Facey [1893]</text>
  <text x="210" y="175" text-anchor="middle" fill="#333" font-size="13">💬 "最低售價為 £1,000"</text>
  <line x1="60" y1="190" x2="360" y2="190" stroke="#E8F5E9" stroke-width="1"/>
  <text x="210" y="215" text-anchor="middle" fill="#555" font-size="12">語境：回覆價格查詢</text>
  <text x="210" y="240" text-anchor="middle" fill="#555" font-size="12">性質：僅提供資訊</text>
  <rect x="80" y="260" width="260" height="35" rx="18" fill="#E8F5E9"/>
  <text x="210" y="283" text-anchor="middle" fill="#2E7D32" font-size="13" font-weight="bold">❌ 回覆查詢 → 不構成要約</text>

  <!-- Case 2: Carlill v Carbolic Smoke Ball -->
  <rect x="410" y="100" width="360" height="220" rx="15" fill="white" stroke="#1565C0" stroke-width="2.5" filter="url(#card7)"/>
  <rect x="410" y="100" width="360" height="45" rx="15" fill="#1565C0"/>
  <rect x="410" y="130" width="360" height="15" fill="#1565C0"/>
  <text x="590" y="130" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Carlill v Carbolic Smoke Ball [1893]</text>
  <text x="590" y="175" text-anchor="middle" fill="#333" font-size="13">💬 "使用後仍染流感，賠償 £100"</text>
  <line x1="440" y1="190" x2="740" y2="190" stroke="#E3F2FD" stroke-width="1"/>
  <text x="590" y="215" text-anchor="middle" fill="#555" font-size="12">語境：公開廣告 + 存入保證金</text>
  <text x="590" y="240" text-anchor="middle" fill="#555" font-size="12">性質：明確的單邊要約</text>
  <rect x="460" y="260" width="260" height="35" rx="18" fill="#E3F2FD"/>
  <text x="590" y="283" text-anchor="middle" fill="#1565C0" font-size="13" font-weight="bold">✅ 廣告 → 構成要約</text>

  <!-- Key principle -->
  <rect x="80" y="350" width="640" height="100" rx="15" fill="#FFF8E1" stroke="#F57F17" stroke-width="2" filter="url(#card7)"/>
  <text x="400" y="385" text-anchor="middle" fill="#E65100" font-size="16" font-weight="bold">🔑 核心原則</text>
  <text x="400" y="415" text-anchor="middle" fill="#333" font-size="14">同樣的文字，在不同語境下可能構成要約或僅是回覆查詢</text>
  <text x="400" y="440" text-anchor="middle" fill="#555" font-size="13">Everything depends on the words employed and the context</text>

  <!-- Factors -->
  <rect x="30" y="475" width="230" height="100" rx="12" fill="white" stroke="#4CAF50" stroke-width="1.5" filter="url(#card7)"/>
  <text x="145" y="505" text-anchor="middle" fill="#2E7D32" font-size="13" font-weight="bold">📝 使用的字眼</text>
  <text x="145" y="530" text-anchor="middle" fill="#666" font-size="12">Words & Images</text>
  <text x="145" y="555" text-anchor="middle" fill="#666" font-size="11">是否表達承諾意圖？</text>

  <rect x="285" y="475" width="230" height="100" rx="12" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#card7)"/>
  <text x="400" y="505" text-anchor="middle" fill="#1565C0" font-size="13" font-weight="bold">🌐 背景語境</text>
  <text x="400" y="530" text-anchor="middle" fill="#666" font-size="12">Context</text>
  <text x="400" y="555" text-anchor="middle" fill="#666" font-size="11">在什麼情況下作出？</text>

  <rect x="540" y="475" width="230" height="100" rx="12" fill="white" stroke="#E65100" stroke-width="1.5" filter="url(#card7)"/>
  <text x="655" y="505" text-anchor="middle" fill="#E65100" font-size="13" font-weight="bold">👤 合理人標準</text>
  <text x="655" y="530" text-anchor="middle" fill="#666" font-size="12">Reasonable Person</text>
  <text x="655" y="555" text-anchor="middle" fill="#666" font-size="11">客觀判斷，非主觀意圖</text>
</svg>
