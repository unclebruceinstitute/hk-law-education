<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Noto Sans TC', sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#E0F0FF"/>
      <stop offset="100%" stop-color="#F0F8E8"/>
    </linearGradient>
    <linearGradient id="pillar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E6D0"/>
      <stop offset="100%" stop-color="#D4A574"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="120" cy="80" rx="60" ry="30" fill="white" opacity="0.7"/>
  <ellipse cx="160" cy="70" rx="50" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="650" cy="100" rx="70" ry="28" fill="white" opacity="0.6"/>
  <ellipse cx="700" cy="90" rx="50" ry="22" fill="white" opacity="0.6"/>
  <!-- Grass -->
  <rect x="0" y="480" width="800" height="120" fill="#90C67C" rx="0"/>
  <rect x="0" y="480" width="800" height="8" fill="#7AB85E" rx="0"/>
  <!-- Title Banner -->
  <rect x="150" y="30" width="500" height="60" rx="30" fill="#2C5F2D" filter="url(#shadow)"/>
  <text x="400" y="70" text-anchor="middle" fill="#FFF8DC" font-size="24" font-weight="bold">⚖️ 合約成立的三大支柱</text>
  <!-- Pillar 1 -->
  <rect x="100" y="200" width="160" height="260" rx="8" fill="url(#pillar)" stroke="#8B6914" stroke-width="2" filter="url(#shadow)"/>
  <rect x="85" y="185" width="190" height="20" rx="4" fill="#D4A574" stroke="#8B6914" stroke-width="1"/>
  <rect x="90" y="460" width="180" height="15" rx="3" fill="#D4A574" stroke="#8B6914" stroke-width="1"/>
  <text x="180" y="290" text-anchor="middle" fill="#2C5F2D" font-size="16" font-weight="bold">①</text>
  <text x="180" y="320" text-anchor="middle" fill="#2C5F2D" font-size="14" font-weight="bold">Consensus</text>
  <text x="180" y="340" text-anchor="middle" fill="#2C5F2D" font-size="14" font-weight="bold">ad idem</text>
  <text x="180" y="375" text-anchor="middle" fill="#5D4E37" font-size="12">（合意）</text>
  <text x="180" y="400" text-anchor="middle" fill="#5D4E37" font-size="11">要約 + 承諾</text>
  <!-- Pillar 2 -->
  <rect x="320" y="230" width="160" height="230" rx="8" fill="url(#pillar)" stroke="#8B6914" stroke-width="2" filter="url(#shadow)"/>
  <rect x="305" y="215" width="190" height="20" rx="4" fill="#D4A574" stroke="#8B6914" stroke-width="1"/>
  <rect x="310" y="460" width="180" height="15" rx="3" fill="#D4A574" stroke="#8B6914" stroke-width="1"/>
  <text x="400" y="310" text-anchor="middle" fill="#2C5F2D" font-size="16" font-weight="bold">②</text>
  <text x="400" y="340" text-anchor="middle" fill="#2C5F2D" font-size="13" font-weight="bold">Animus</text>
  <text x="400" y="360" text-anchor="middle" fill="#2C5F2D" font-size="13" font-weight="bold">contrahendi</text>
  <text x="400" y="395" text-anchor="middle" fill="#5D4E37" font-size="12">（建立法律</text>
  <text x="400" y="415" text-anchor="middle" fill="#5D4E37" font-size="12">關係的意圖）</text>
  <!-- Pillar 3 -->
  <rect x="540" y="260" width="160" height="200" rx="8" fill="url(#pillar)" stroke="#8B6914" stroke-width="2" filter="url(#shadow)"/>
  <rect x="525" y="245" width="190" height="20" rx="4" fill="#D4A574" stroke="#8B6914" stroke-width="1"/>
  <rect x="530" y="460" width="180" height="15" rx="3" fill="#D4A574" stroke="#8B6914" stroke-width="1"/>
  <text x="620" y="330" text-anchor="middle" fill="#2C5F2D" font-size="16" font-weight="bold">③</text>
  <text x="620" y="360" text-anchor="middle" fill="#2C5F2D" font-size="14" font-weight="bold">Consideration</text>
  <text x="620" y="395" text-anchor="middle" fill="#5D4E37" font-size="12">（對價）</text>
  <!-- Contract roof -->
  <polygon points="400,120 80,185 720,185" fill="#C0392B" opacity="0.85" stroke="#922B21" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="160" text-anchor="middle" fill="white" font-size="18" font-weight="bold">CONTRACT</text>
  <!-- Footer -->
  <rect x="200" y="510" width="400" height="50" rx="25" fill="#2C5F2D" opacity="0.9" filter="url(#shadow)"/>
  <text x="400" y="542" text-anchor="middle" fill="#FFF8DC" font-size="14">三根支柱缺一不可，合約方能成立</text>
  <!-- Ghibli-style flowers -->
  <circle cx="50" cy="540" r="6" fill="#FF9999" opacity="0.7"/>
  <circle cx="65" cy="555" r="5" fill="#FFCC99" opacity="0.7"/>
  <circle cx="750" cy="545" r="6" fill="#FF9999" opacity="0.7"/>
  <circle cx="735" cy="560" r="5" fill="#99CCFF" opacity="0.7"/>
</svg>
